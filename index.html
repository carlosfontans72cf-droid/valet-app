<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valet Agua Verde PRO</title>

<style>
body {
  font-family: Arial;
  background:#f4f4f4;
  padding:15px;
}
.container {
  background:#fff;
  padding:15px;
  border-radius:10px;
}
input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}
button {
  border:none;
  border-radius:6px;
  color:#fff;
  font-weight:bold;
}
.btn-save {background:#3498db;}
.btn-green {background:#27ae60;}
.btn-yellow {background:#f1c40f;}
.btn-red {background:#e74c3c;}
.btn-purple {background:#6c5ce7;}

.car {
  background:#fafafa;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
<h2>Valet Agua Verde PRO</h2>

<input id="ticket" placeholder="Número de ticket">

<select id="estado">
<option>Estacionado</option>
<option>Solicitado</option>
<option>Entregado</option>
</select>

<select id="llave">
<option>Llave en cajón</option>
<option>Llave colgada</option>
<option>Llave con dueño</option>
<option>Sin llave</option>
</select>

<button class="btn-save" onclick="guardar()">Guardar vehículo</button>

<h3>Vehículos</h3>
<div id="lista"></div>
</div>

<script>
let autos = JSON.parse(localStorage.getItem("autos")) || [];

function guardar(){
  let ticket = document.getElementById("ticket").value;
  let estado = document.getElementById("estado").value;
  let llave = document.getElementById("llave").value;

  if(ticket === "") return alert("Ingresá ticket");

  autos.push({ticket, estado, llave});
  localStorage.setItem("autos", JSON.stringify(autos));

  render();
}

function render(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  autos.forEach((a,i)=>{
    lista.innerHTML += `
      <div class="car">
        Ticket: ${a.ticket}<br>
        Estado: ${a.estado}<br>
        Llave: ${a.llave}<br><br>

        <button class="btn-green" onclick="cambiar(${i},'Estacionado')">Estacionado</button>
        <button class="btn-yellow" onclick="cambiar(${i},'Solicitado')">Solicitado</button>
        <button class="btn-red" onclick="cambiar(${i},'Entregado')">Entregado</button>
        <br><br>

        <button class="btn-purple" onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}

function cambiar(i,estado){
  autos[i].estado = estado;
  localStorage.setItem("autos", JSON.stringify(autos));
  render();
}

function eliminar(i){
  autos.splice(i,1);
  localStorage.setItem("autos", JSON.stringify(autos));
  render();
}

render();
</script>

</body>
</html>
